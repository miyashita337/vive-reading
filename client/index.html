<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>vive-reading</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 16px;
      background: #111;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 16px; font-weight: 600; }
    #status {
      font-size: 12px;
      color: #888;
    }
    #status.playing { color: #4ade80; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      -webkit-overflow-scrolling: touch;
    }
    .msg {
      padding: 12px 16px;
      border-bottom: 1px solid #1a1a1a;
      cursor: pointer;
      transition: background 0.15s;
    }
    .msg:active { background: #1a2a1a; }
    .msg.playing { background: #0d2818; border-left: 3px solid #4ade80; }
    .msg-meta {
      display: flex;
      gap: 8px;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    .msg-source {
      background: #222;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 11px;
    }
    .msg-content {
      font-size: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
      overflow: hidden;
      max-height: 3.6em;
    }
    #controls {
      padding: 16px;
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      justify-content: center;
      padding-bottom: env(safe-area-inset-bottom, 16px);
    }
    #stop-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid #333;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    #stop-btn:active { background: #2a1a1a; border-color: #ef4444; }
    #stop-btn.playing { border-color: #ef4444; background: #1a0a0a; }
    #init-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #init-btn {
      padding: 20px 40px;
      font-size: 18px;
      background: #1a3a2a;
      color: #4ade80;
      border: 2px solid #4ade80;
      border-radius: 12px;
      cursor: pointer;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <!-- iOS Safari autoplay unlock overlay -->
  <div id="init-overlay">
    <button id="init-btn">vive-reading を開始</button>
  </div>

  <header>
    <h1>vive-reading</h1>
    <span id="status">待機中</span>
  </header>

  <div id="messages"></div>

  <div id="controls">
    <button id="stop-btn">■</button>
  </div>

  <script>
    const API = location.origin;
    let audioCtx = null;
    let isPlaying = false;
    let playingMsgId = null;

    // iOS Safari autoplay unlock
    document.getElementById('init-btn').addEventListener('click', () => {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume();
      document.getElementById('init-overlay').classList.add('hidden');
      loadMessages();
      // Poll for new messages every 5s
      setInterval(loadMessages, 5000);
    });

    async function loadMessages() {
      try {
        const res = await fetch(`${API}/api/messages`);
        const messages = await res.json();
        renderMessages(messages.reverse()); // newest at bottom
      } catch (e) {
        console.error('Failed to load messages:', e);
      }
    }

    function renderMessages(messages) {
      const container = document.getElementById('messages');
      const scrolledToBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 50;

      container.innerHTML = messages.map(msg => `
        <div class="msg ${msg.id === playingMsgId ? 'playing' : ''}" data-id="${msg.id}" onclick="playFrom(${msg.id})">
          <div class="msg-meta">
            <span class="msg-source">${escHtml(msg.source)}</span>
            <span>${escHtml(msg.author)}</span>
            <span>${formatTime(msg.created_at)}</span>
          </div>
          <div class="msg-content">${escHtml(msg.filtered_text || msg.content)}</div>
        </div>
      `).join('');

      if (scrolledToBottom) {
        container.scrollTop = container.scrollHeight;
      }
    }

    async function playFrom(fromId) {
      try {
        await fetch(`${API}/api/play`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ from_id: fromId }),
        });
        isPlaying = true;
        playingMsgId = fromId;
        updateUI();
      } catch (e) {
        console.error('Play failed:', e);
      }
    }

    document.getElementById('stop-btn').addEventListener('click', async () => {
      try {
        await fetch(`${API}/api/stop`, { method: 'POST' });
        isPlaying = false;
        playingMsgId = null;
        updateUI();
      } catch (e) {
        console.error('Stop failed:', e);
      }
    });

    function updateUI() {
      const status = document.getElementById('status');
      const stopBtn = document.getElementById('stop-btn');
      if (isPlaying) {
        status.textContent = '再生中';
        status.className = 'playing';
        stopBtn.className = 'playing';
      } else {
        status.textContent = '待機中';
        status.className = '';
        stopBtn.className = '';
      }
      // Refresh message highlights
      document.querySelectorAll('.msg').forEach(el => {
        el.classList.toggle('playing', Number(el.dataset.id) === playingMsgId);
      });
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function escHtml(s) {
      if (!s) return '';
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
